<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incowgnito</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      max-width: 420px;
      padding: 2rem;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    .subtitle {
      color: #94a3b8;
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }
    .login-btn {
      display: inline-block;
      background: #3b82f6;
      color: #fff;
      text-decoration: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      transition: background 0.15s;
    }
    .login-btn:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Incowgnito</h1>
    <p class="subtitle">Private email aliases powered by your mailcow server. Generate forwarding addresses on demand for Bitwarden or any service.</p>
    <a href="/auth/login" class="login-btn" id="loginBtn">Login with Mailcow</a>
  </div>
  <script>
    fetch("/session-info")
      .then(r => r.json())
      .then(d => { if (d.loggedIn) window.location.href = "/dashboard"; });
  </script>
</body>
</html>
