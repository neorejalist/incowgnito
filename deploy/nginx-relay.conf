# Place this file at:
#   /opt/mailcow-dockerized/data/conf/nginx/incowgnito.conf
#
# mailcow mounts ./data/conf/nginx/ into /etc/nginx/conf.d/ inside
# the nginx-mailcow container, so this file is loaded automatically.
#
# After placing it, reload nginx:
#   docker compose exec nginx-mailcow nginx -s reload
#
# SSL/TLS, session cache, HSTS, and cipher settings are handled
# globally by mailcow's nginx — do not redeclare them here.

server {
    listen 80;
    server_name relay.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name relay.example.com;

    ssl_certificate     /etc/ssl/mail/cert.pem;
    ssl_certificate_key /etc/ssl/mail/key.pem;

    location / {
        proxy_pass         http://incowgnito:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout 90s;
    }
}
