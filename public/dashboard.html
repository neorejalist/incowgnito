<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incowgnito - Dashboard</title>
  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/typography.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/buttons.css">
  <link rel="stylesheet" href="/assets/css/forms.css">
  <link rel="stylesheet" href="/assets/css/cards.css">
  <link rel="stylesheet" href="/assets/css/badges.css">
  <link rel="stylesheet" href="/assets/css/toast.css">
</head>
<body>
  <div class="header">
    <h1 id="serviceName">Incowgnito</h1>
    <div class="header-right">
      <span class="user-email" id="userEmail"></span>
      <a href="/auth/logout" class="btn btn-ghost btn-sm">Logout</a>
    </div>
  </div>

  <main>
    <div class="section">
      <h2>Aliases</h2>
      <div class="form-row">
        <input type="text" id="aliasInput" placeholder="Custom local part (leave blank for random)">
        <button class="btn btn-primary" id="createAliasBtn">Create Alias</button>
      </div>
      <div id="aliasList"></div>
    </div>

    <div class="section">
      <h2>API Keys</h2>
      <p style="color:#94a3b8;font-size:0.85rem;margin-bottom:0.75rem;">Use these keys with Bitwarden's addy.io integration.</p>
      <div class="form-row">
        <input type="text" id="keyNameInput" placeholder="Key name (e.g. Bitwarden)">
        <button class="btn btn-primary" id="createKeyBtn">Create Key</button>
      </div>
      <div id="newKeyDisplay" style="display:none">
        <div class="card">
          <strong>New API key created — copy it now, it won't be shown again:</strong>
          <div class="key-display" id="newKeyValue"></div>
        </div>
      </div>
      <div id="keyList"></div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const $ = (id) => document.getElementById(id);

    const toast = (msg) => {
      const el = $("toast");
      el.textContent = msg;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 2500);
    };

    const api = async (method, path, body) => {
      const opts = { method, headers: {} };
      if (body) {
        opts.headers["Content-Type"] = "application/json";
        opts.body = JSON.stringify(body);
      }
      const res = await fetch(path, opts);
      if (res.status === 204) return null;
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `Request failed (${res.status})`);
      }
      return res.json();
    };

    const loadSession = async () => {
      const data = await api("GET", "/session-info");
      if (!data.loggedIn) return (window.location.href = "/");
      $("userEmail").textContent = data.email;
    };

    const loadBranding = async () => {
      const b = await fetch("/api/branding").then(r => r.json());
      if (!b.serviceName) return;
      document.title = `${b.serviceName} - Dashboard`;
      $("serviceName").textContent = b.serviceName;
    };

    const renderAliases = async () => {
      const { data } = await api("GET", "/auth/aliases-preview");
      const el = $("aliasList");

      if (!data.length) {
        el.innerHTML = '<p class="empty">No aliases yet.</p>';
        return;
      }

      el.innerHTML = data
        .map(
          (a) => `
        <div class="card">
          <div class="alias-row">
            <span class="alias-address">${a.email}</span>
            <div class="alias-actions">
              <span class="badge ${a.active ? "badge-active" : "badge-inactive"}">${a.active ? "Active" : "Inactive"}</span>
              <button class="btn btn-ghost btn-sm" onclick="toggleAlias(${a.id}, ${!a.active})">${a.active ? "Disable" : "Enable"}</button>
              <button class="btn btn-danger btn-sm" onclick="deleteAlias(${a.id})">Delete</button>
            </div>
          </div>
        </div>`
        )
        .join("");
    };

    const renderKeys = async () => {
      const { data } = await api("GET", "/auth/api-keys");
      const el = $("keyList");

      if (!data.length) {
        el.innerHTML = '<p class="empty">No API keys yet.</p>';
        return;
      }

      el.innerHTML = data
        .map(
          (k) => `
        <div class="card">
          <div class="key-row">
            <div>
              <strong>${k.name}</strong>
              <span class="key-meta"> &mdash; created ${new Date(k.created_at).toLocaleDateString()}</span>
            </div>
            <button class="btn btn-danger btn-sm" onclick="deleteKey('${k.id}')">Delete</button>
          </div>
        </div>`
        )
        .join("");
    };

    $("createAliasBtn").onclick = async () => {
      const localPart = $("aliasInput").value.trim();
      const body = localPart ? { local_part: localPart } : {};
      try {
        await api("POST", "/auth/aliases-create", body);
        $("aliasInput").value = "";
        toast("Alias created");
        renderAliases();
      } catch {
        toast("Failed to create alias");
      }
    };

    $("createKeyBtn").onclick = async () => {
      const name = $("keyNameInput").value.trim() || "Default";
      const data = await api("POST", "/auth/api-keys", { name });
      $("keyNameInput").value = "";
      $("newKeyValue").textContent = data.key;
      $("newKeyDisplay").style.display = "block";
      toast("API key created");
      renderKeys();
    };

    window.toggleAlias = async (id, active) => {
      await api("PATCH", `/auth/aliases-toggle/${id}`, { active });
      toast(active ? "Alias enabled" : "Alias disabled");
      renderAliases();
    };

    window.deleteAlias = async (id) => {
      if (!confirm("Delete this alias? Emails sent to it will stop working.")) return;
      await api("DELETE", `/auth/aliases-delete/${id}`);
      toast("Alias deleted");
      renderAliases();
    };

    window.deleteKey = async (id) => {
      if (!confirm("Delete this API key?")) return;
      await api("DELETE", `/auth/api-keys/${id}`);
      toast("API key deleted");
      renderKeys();
    };

    loadSession();
    loadBranding();
    renderAliases();
    renderKeys();
  </script>
</body>
</html>
