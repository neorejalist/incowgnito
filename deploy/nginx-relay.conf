# Place this file at:
#   /opt/mailcow-dockerized/data/conf/nginx/relay.conf
#
# mailcow mounts ./data/conf/nginx/ into /etc/nginx/conf.d/ inside
# the nginx-mailcow container, so this file is loaded automatically.
#
# After placing it, reload nginx:
#   docker compose exec nginx-mailcow nginx -s reload
#
# SSL prerequisite: relay.example.com must be covered by your mailcow cert.
# Add it to ADDITIONAL_SAN in mailcow.conf and run:
#   docker compose run --rm certdumper
# Or use a wildcard cert (*.example.com) which covers it automatically.

server {
    listen 80;
    server_name relay.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name relay.example.com;

    # Mailcow manages these certs via acme.sh / certdumper.
    # relay.example.com must be included in the certificate's SANs.
    ssl_certificate     /etc/ssl/mail/cert.pem;
    ssl_certificate_key /etc/ssl/mail/key.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    location / {
        proxy_pass         http://incowgnito:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout 90s;
    }
}
